name: GymTime
options:
  bundleIdPrefix: com.jsamitt
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: SDQAUC94D4
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  GymTime:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GymTime
    resources:
      - path: GymTime/Resources
    info:
      path: GymTime/Info.plist
      properties:
        CFBundleDisplayName: GymTime
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIAppFonts:
          - InterTight-Regular.ttf
          - InterTight-Medium.ttf
          - InterTight-SemiBold.ttf
          - InterTight-Bold.ttf
          - Inter-Regular.ttf
          - Inter-Medium.ttf
          - Inter-SemiBold.ttf
          - JetBrainsMono-Regular.ttf
          - JetBrainsMono-Medium.ttf
          - JetBrainsMono-SemiBold.ttf
        NSUserNotificationUsageDescription: "GymTime uses notifications so your rest-timer buzz still fires when the screen is off."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jsamitt.GymTime
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
